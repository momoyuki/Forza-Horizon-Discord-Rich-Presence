<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forza Horizon RP Settings</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-root">
    <div class="panel-area">
      <header class="hidden">
        <div class="logo-container">
          <img src="assets/logo.png" alt="Logo" class="logo" id="app-logo" />
          <div class="header-text">
            <h1>Forza Rich Presence</h1>
          </div>
        </div>
      </header>

      <main>
        <!-- Top: Status (Full Width) -->
        <section class="card status-card">
          <div class="status-header">
            <div class="status-info">
              <span class="status-label">FORZA RPC</span>
              <div class="status-indicator" id="status-indicator">
                <span class="pulse-dot"></span>
                <span class="status-text" id="status-text">Waiting...</span>
              </div>
            </div>
            <p class="status-detail" id="status-detail">Launch game to broadcast</p>
          </div>
        </section>

        <!-- Bottom: Actions Row -->
        <div class="actions-row">
          <section class="card action-card">
            <button id="fix-uwp-btn" class="primary-btn">Fix Network</button>
            <p class="success-msg hidden" id="uwp-success">Network fixed</p>
          </section>

          <section class="card action-card">
            <button id="update-db-btn" class="secondary-btn">Update Cars</button>
          </section>

          <section class="card action-card mini-card">
            <div class="settings-list">
              <div class="setting-item">
                <label class="checkbox-container">
                  <input type="checkbox" id="start-minimized-check">
                  <span class="checkmark"></span>
                  <span class="label-text">Launch Minimized</span>
                </label>
              </div>
              <div class="setting-item">
                <label class="checkbox-container">
                  <input type="checkbox" id="auto-update-check">
                  <span class="checkmark"></span>
                  <span class="label-text">Auto Update</span>
                </label>
              </div>
              <div class="setting-item">
                <label class="checkbox-container">
                  <input type="checkbox" id="autostart-check">
                  <span class="checkmark"></span>
                  <span class="label-text">Run on Startup</span>
                </label>
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer>
        <p>Running in background. You can safely close this window.</p>
      </footer>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>

</html>
